name: Component Gallery E2E

on:
  pull_request:
    paths:
      - "examples/component-gallery/**"
      - "crates/ui-**/**"
      - "crates/kinetics/**"
      - "crates/ui-motion/**"
      - "crates/ui-runtime/**"
      - "crates/ui-styles/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli@0.7 --locked

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/component-gallery/e2e/package-lock.json

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('examples/component-gallery/e2e/package-lock.json') }}

      - name: Install Node deps
        working-directory: examples/component-gallery/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: examples/component-gallery/e2e
        run: npx playwright install --with-deps chromium webkit

      - name: Verify Cargo-side parity tests
        run: |
          cargo test -p component-gallery --test manifest
          cargo test -p component-gallery --test spring_reference

      - name: Unit tests (helpers + reporter)
        working-directory: examples/component-gallery/e2e
        run: npm run test:unit

      - name: TypeScript type-check
        working-directory: examples/component-gallery/e2e
        run: npm run lint:tsc

      - name: Run e2e suite
        working-directory: examples/component-gallery/e2e
        run: npm run e2e:ci
        env:
          CI: "true"

      - name: Detect new Linux baselines that need committing
        if: always()
        run: |
          NEW_BASELINES=$(git status --porcelain examples/component-gallery/e2e/tests/visual.spec.ts-snapshots/ | grep "linux\\.png" || true)
          if [ -n "$NEW_BASELINES" ]; then
            echo "::warning::New Linux baselines generated this run. Commit them to make subsequent CI runs deterministic."
            echo "$NEW_BASELINES"
          fi

      - name: Upload Linux baselines for review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-baselines
          path: examples/component-gallery/e2e/tests/visual.spec.ts-snapshots/*-linux.png
          if-no-files-found: ignore

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: examples/component-gallery/e2e/audit-report.md

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: examples/component-gallery/e2e/playwright-report/

      - name: Summarise audit in PR
        if: always()
        run: |
          if [ -f examples/component-gallery/e2e/audit-report.md ]; then
            {
              echo "## Component Gallery Audit"
              echo
              head -n 80 examples/component-gallery/e2e/audit-report.md
            } >> "$GITHUB_STEP_SUMMARY"
          fi
