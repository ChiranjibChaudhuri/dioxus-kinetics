# cargo-deny configuration — see https://embarkstudios.github.io/cargo-deny/
#
# Run locally:
#   cargo install cargo-deny --locked
#   cargo deny check

[graph]
all-features = true

[advisories]
# Fail on any known security advisory in the dep graph.
yanked = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Track these crates carefully — they're heavy and worth scrutinizing on
# every bump.
deny = []
skip = []
skip-tree = []

[licenses]
# Workspace declares "MIT OR Apache-2.0"; allow common permissive licenses
# that appear in the transitive graph (Dioxus, wgpu, web-sys, etc.).
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "CC0-1.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "0BSD",
  "BSL-1.0",
  "OpenSSL",
  "MIT-0",
]
confidence-threshold = 0.93
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
